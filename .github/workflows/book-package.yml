name: Book package

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-book-package:
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install publication dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build python3 curl ca-certificates \
            texlive-xetex texlive-latex-extra texlive-fonts-recommended \
            texlive-fonts-extra texlive-pictures fonts-lmodern

          # Install pandoc 3.9.0.2 from GitHub releases.
          curl -fsSL \
            https://github.com/jgm/pandoc/releases/download/3.9.0.2/pandoc-3.9.0.2-1-amd64.deb \
            -o /tmp/pandoc.deb
          sudo dpkg -i /tmp/pandoc.deb

          # Install matching pandoc-crossref v0.3.24a.
          curl -fsSL \
            https://github.com/lierdakil/pandoc-crossref/releases/download/v0.3.24a/pandoc-crossref-Linux-X64.tar.xz \
            | sudo tar -xJ -C /usr/local/bin pandoc-crossref

          pandoc --version
          pandoc-crossref --version

      - name: Check source hygiene
        run: bash ci/check-source-hygiene.sh

      - name: Build proposal package and PDFs
        run: bash ci/build-book-package.sh

      - name: Upload generated PDFs
        uses: actions/upload-artifact@v4
        with:
          name: snodec-book-pdfs
          path: |
            dist/pdf/book-proposal-package.pdf
            dist/pdf/book-proposal-sample-package.pdf
            dist/pdf/snodec-book.pdf

      - name: Upload generated publisher package
        uses: actions/upload-artifact@v4
        with:
          name: snodec-book-proposal-package
          path: dist/packages/*.tar.gz
          if-no-files-found: error
